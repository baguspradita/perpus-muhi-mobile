name: perpus_mobile
description: "Perpustakaan Muhi - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management - Riverpod with code generation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Dependency Injection
  get_it: ^8.0.2

  # Networking - Dio with interceptors
  dio: ^5.7.0

  # JSON Serialization
  json_serializable: ^6.9.0
  freezed_annotation: ^3.0.0

  # Secure Storage for tokens
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.0

  # Connectivity
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.5.2

  # Logging
  logger: ^2.5.0

  # Equatable for entities
  equatable: ^2.0.5

  # Form validation
  formz: ^0.7.0

  # Functional programming (Either for error handling)
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  freezed: ^3.0.6
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/